<!DOCTYPE html>
<html lang="en" dir="ltr">
 <head>
  <meta charset="utf-8">
  <title>CSS Hover Card Effect</title>


  <style media="screen">

* {
    outline: 1px solid red !important;
}

   /*THIS IS THE HOLDING CONTAINER*/
   .books_container{
    display: grid;
    grid-template-areas: 
        "first_shelf"
        "second_shelf";
    grid-template-columns: 1fr 3fr;
    gap: 30px;
    max-width: fit-content;
    width: 70%;
    margin-inline: auto;
    background-size: cover;
    transform: scale(1);
    transition: all 0.3s ease-in-out;
   }

   .first_shelf {
    width: 50%;
    height: auto;
    border-radius: 32px;
    }
    
    .first_shelf img {
        width: 100%;
        height: auto;
    }
.second_shelf {
    background: url('assets/logo-capital_nexus.svg');
    border-radius: 32px;
   }
   /*THIS IS THE INTERNAL CONTAINER THAT SHOWS ON HOVER*/
   .hoverdiv{
    position: relative;
    display: block;
    width: 50%;
    height: 50%;
    padding: 24px;
    background: rgba(0,0,0,0.8);
    color: #a20303;
    opacity: 0;
    border-radius: 32px;
    transition: all 0.3s ease-in-out;
    transition-delay: 0.3s;
    box-sizing: border-box;
   }


   /*THIS IS THE MAIN LINE OF CODE THAT TARGETS THE INTERNAL CONTAINER*/
   .first_shelf:hover .hoverdiv, .first_shelf:active .hoverdiv{
   /*ADD PROPERTIES HERE THAT YOU WANT TO CHANGE WHEN A USER HOVERS*/
   /*NOTE 1: MOST PROPERTIES WITH NUMERIC VALUES CAN BE ANIMATED*/
   /*NOTE 2: PROPERTIES WITHOUT NUMBERS, LIKE DISPLAY:BLOCK, WILL NOT ANIMATE*/
    opacity: 1;
   }


   .first_shelf:hover, .second_shelf:hover{
    transform: scale(1.03);
   }


  </style>
 </head>


 <body>

<div class="books_container">
    <div class="first_shelf">
        <div class="hoverdiv">
            <p>Voluntário em Mestrado: Análise de Sentimento de Casos Judiciais </p>
            <img src="/assets/logo-call_of_chtullu.png" alt="Logomarca IDP">
            <div class="project_tech">
                Python
                WebScrapping
                Local LLM
                AWS
            </div>
        </div>
    </div>
    <div class="second_shelf">
        <div class="hoverdiv"><p>Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        </div>
    </div>
</div>    
 </body>
</html>
